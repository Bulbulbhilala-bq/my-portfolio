<!-- CONTACT -->
<section class="contact section" id="contact">
  <div class="container">

    <p class="sec-tag">Get In Touch</p>

    <h2 class="sec-title">
      Contact <span>Me</span>
    </h2>

    <div class="contact-grid">

      <div class="contact-left">

        <h3>Let's build something amazing together!</h3>

        <p>
          Have a project in mind or just want to say hi?
          Drop me a message.
        </p>

        <div class="info-list">
          <div class="info-item">
            <span>📧</span>
            <span>bulbul@email.com</span>
          </div>

          <div class="info-item">
            <span>📱</span>
            <span>+91 98765 43210</span>
          </div>

          <div class="info-item">
            <span>📍</span>
            <span>India</span>
          </div>
        </div>

      </div>

      <!-- WEB3FORMS FORM -->
      <form
        class="contact-form"
        action="https://api.web3forms.com/submit"
        method="POST"
      >

        <!-- ACCESS KEY -->
        <input
          type="hidden"
          name="access_key"
          value="e0e273f2-688c-4312-92c9-4415146a4532"
        >

        <!-- REDIRECT -->
        <input
          type="hidden"
          name="redirect"
          value="https://my-portfolio-12-f8x5.onrender.com"
>"
        >

        <div class="form-row">

          <div class="field">
            <label>Name</label>

            <input
              type="text"
              name="name"
              placeholder="Your name"
              required
            >
          </div>

          <div class="field">
            <label>Email</label>

            <input
              type="email"
              name="email"
              placeholder="your@email.com"
              required
            >
          </div>

        </div>

        <div class="field">

          <label>Subject</label>

          <input
            type="text"
            name="subject"
            placeholder="What's this about?"
            required
          >

        </div>

        <div class="field">

          <label>Message</label>

          <textarea
            name="message"
            rows="5"
            placeholder="Tell me about your project..."
            required
          ></textarea>

        </div>

        <button type="submit" class="btn btn-grad btn-full">
          Send Message →
        </button>

      </form>

    </div>

  </div>
</section>
